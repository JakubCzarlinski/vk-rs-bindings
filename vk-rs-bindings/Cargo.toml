[package]
name = "vk-rs-bindings"
version = "0.1.0"
edition = "2024"
description = "Auto-generated Vulkan FFI (vk-codegen)"

[dependencies]
libloading = "0.9.0"

[features]
# Vulkan 1.0 enabled by default
default = ["VK_VERSION_1_0"]

# Core Vulkan versions
# Vulkan base API interface definitions
# version: 1.0
VK_BASE_VERSION_1_0 = []
# Vulkan compute API interface definitions
# version: 1.0
VK_COMPUTE_VERSION_1_0 = ["VK_BASE_VERSION_1_0"]
# Vulkan graphics API interface definitions
# version: 1.0
VK_GRAPHICS_VERSION_1_0 = ["VK_COMPUTE_VERSION_1_0"]
# Vulkan core API interface definitions
# version: 1.0
VK_VERSION_1_0 = ["VK_GRAPHICS_VERSION_1_0"]
# Vulkan base 1.1 API interface definitions.
# version: 1.1
VK_BASE_VERSION_1_1 = ["VK_BASE_VERSION_1_0"]
# Vulkan compute 1.1 API interface definitions.
# version: 1.1
VK_COMPUTE_VERSION_1_1 = ["VK_COMPUTE_VERSION_1_0", "VK_BASE_VERSION_1_1"]
# Vulkan graphics 1.1 API interface definitions.
# version: 1.1
VK_GRAPHICS_VERSION_1_1 = ["VK_GRAPHICS_VERSION_1_0", "VK_COMPUTE_VERSION_1_1"]
# Vulkan 1.1 core API interface definitions
# version: 1.1
VK_VERSION_1_1 = ["VK_VERSION_1_0", "VK_GRAPHICS_VERSION_1_1"]
# Vulkan base 1.2 API interface definitions.
# version: 1.2
VK_BASE_VERSION_1_2 = ["VK_BASE_VERSION_1_1"]
# Vulkan compute 1.2 API interface definitions.
# version: 1.2
