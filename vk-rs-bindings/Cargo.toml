# Vulkan compute 1.4 API interface definitions.
# version: 1.4
VK_COMPUTE_VERSION_1_4 = ["VK_COMPUTE_VERSION_1_3", "VK_BASE_VERSION_1_4"]
# Vulkan graphics 1.4 API interface definitions.
# version: 1.4
